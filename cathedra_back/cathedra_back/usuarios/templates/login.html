<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cathedra — Ingresar</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(139,115,85,0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    .top-line {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #8b7355, transparent);
    }

    .container {
      width: 100%;
      max-width: 380px;
      padding: 24px;
      position: relative;
      animation: fadeUp 0.8s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(139,115,85,0.18);
      padding: 48px 40px;
      position: relative;
    }

    .corner { position: absolute; width: 16px; height: 16px; opacity: 0.5; }
    .corner.tl { top: -1px; left: -1px; border-top: 1px solid #8b7355; border-left: 1px solid #8b7355; }
    .corner.tr { top: -1px; right: -1px; border-top: 1px solid #8b7355; border-right: 1px solid #8b7355; }
    .corner.bl { bottom: -1px; left: -1px; border-bottom: 1px solid #8b7355; border-left: 1px solid #8b7355; }
    .corner.br { bottom: -1px; right: -1px; border-bottom: 1px solid #8b7355; border-right: 1px solid #8b7355; }

    .logo { text-align: center; margin-bottom: 40px; }

    .logo-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 300;
      color: #e8e0d0;
      letter-spacing: 8px;
      text-transform: uppercase;
    }

    .logo-divider {
      width: 36px;
      height: 1px;
      background: #8b7355;
      margin: 12px auto;
      opacity: 0.7;
    }

    .logo-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: #8b7355;
      letter-spacing: 3px;
    }

    .field-group { margin-bottom: 20px; }

    .field-label {
      display: block;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #8b7355;
      margin-bottom: 9px;
      font-weight: 400;
    }

    .field-input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(139,115,85,0.22);
      color: #c8bfaf;
      padding: 12px 16px;
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      font-weight: 300;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
      border-radius: 0;
      -webkit-appearance: none;
    }

    .field-input::placeholder { color: #3a3a3a; }
    .field-input:focus {
      border-color: rgba(139,115,85,0.55);
      background: rgba(139,115,85,0.04);
    }

    .error-msg {
      background: rgba(180,60,40,0.1);
      border: 1px solid rgba(180,60,40,0.3);
      color: #c97060;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.5px;
      padding: 10px 14px;
      margin-bottom: 20px;
      text-align: center;
    }

    .submit-btn {
      width: 100%;
      background: transparent;
      border: 1px solid rgba(139,115,85,0.5);
      color: #c8a96e;
      padding: 13px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.3s;
      border-radius: 0;
    }

    .submit-btn:hover {
      background: rgba(139,115,85,0.1);
      border-color: rgba(139,115,85,0.8);
      color: #dfc080;
    }

    .footer-text {
      text-align: center;
      margin-top: 28px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="top-line"></div>
  <div class="container">
    <div class="card">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="logo">
        <div class="logo-title">Cathedra</div>
        <div class="logo-divider"></div>
        <div class="logo-subtitle">Silla del Maestro</div>
      </div>
      {% if error %}
        <div class="error-msg">{{ error }}</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="field-group">
          <label class="field-label" for="username">Usuario</label>
          <input class="field-input" type="text" id="username" name="username" placeholder="nombre de usuario" required autofocus>
        </div>
        <div class="field-group">
          <label class="field-label" for="password">Contraseña</label>
          <input class="field-input" type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button class="submit-btn" type="submit">Ingresar</button>
      </form>
    </div>
    <div class="footer-text">Universidad de San Buenaventura &nbsp;·&nbsp; Bogotá</div>
  </div>
</body>
</html>
